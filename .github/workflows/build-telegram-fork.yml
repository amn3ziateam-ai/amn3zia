name: Build AMN3ZIA (Telegram Fork)

# Builds the official Telegram Android source with AMN3ZIA branding applied.
# This guarantees 100% Telegram UX/feature parity by construction —
# we never rewrite Telegram, we only patch names and colours.

on:
  workflow_dispatch:
  push:
    paths:
      - 'patches/**'
      - '.github/workflows/build-telegram-fork.yml'

env:
  # Telegram Android tag to build from. Update when a new Telegram release lands.
  TG_TAG: master

jobs:
  build-fork:
    name: Build APK (Telegram fork + AMN3ZIA branding)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 1. Checkout THIS repo (contains patches/) ─────────────────────────
      - name: Checkout amn3zia repo
        uses: actions/checkout@v4
        with:
          path: amn3zia

      # ── 2. Shallow-clone official Telegram Android ─────────────────────────
      - name: Clone Telegram Android (shallow)
        run: |
          git clone --depth=1 --branch "$TG_TAG" \
            https://github.com/DrKLO/Telegram tg-src
          echo "Telegram HEAD: $(git -C tg-src rev-parse --short HEAD)"

      # ── 3. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. NDK 27.2 (matches Telegram master ndkVersion) ──────────────────
      - name: Install NDK 27.2
        run: |
          ANDROID_SDK=$ANDROID_HOME
          echo "SDK: $ANDROID_SDK"
          $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" \
            --sdk_root="$ANDROID_SDK"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK/ndk/27.2.12479018" >> $GITHUB_ENV
          ls "$ANDROID_SDK/ndk/27.2.12479018" | head -5

      # ── 5. Apply AMN3ZIA branding patches ─────────────────────────────────
      - name: Apply AMN3ZIA branding
        env:
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          bash amn3zia/patches/apply-branding.sh tg-src \
            "$TELEGRAM_API_ID" "$TELEGRAM_API_HASH"

      # ── 6. Gradle cache ───────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: tg-fork-gradle-${{ hashFiles('tg-src/**/*.gradle*') }}
          restore-keys: tg-fork-gradle-

      # ── 7. Build debug APK ────────────────────────────────────────────────
      # TMessagesProj is a LIBRARY (.aar), TMessagesProj_App is the APP (.apk).
      # pipefail ensures Gradle failures are not masked by the tee pipe.
      - name: Build debug APK
        working-directory: tg-src
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew :TMessagesProj_App:assembleAfatDebug \
            -Pandroid.ndkVersion=27.2.12479018 \
            --no-daemon --stacktrace \
            2>&1 | tee /tmp/gradle_build.log
          echo "=== Last 50 lines of Gradle output ==="
          tail -50 /tmp/gradle_build.log

      # ── 8. Find APK — diagnostic output ───────────────────────────────────
      - name: Find built APKs
        if: always()
        run: |
          echo "=== All APK files anywhere under tg-src ==="
          find tg-src -name "*.apk" -type f 2>/dev/null || echo "(none)"
          echo ""
          echo "=== TMessagesProj_App/build/outputs tree ==="
          find tg-src/TMessagesProj_App/build/outputs -type f 2>/dev/null | head -40 \
            || echo "(directory does not exist)"
          echo ""
          echo "=== Full build/outputs tree (all modules) ==="
          find tg-src -path "*/build/outputs" -type d 2>/dev/null \
            | xargs -I{} find {} -name "*.apk" 2>/dev/null || echo "(no apks)"

      # ── 9. Upload APK ─────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: amn3zia-fork-debug
          # afat flavor debug APK: TMessagesProj_App/build/outputs/apk/afat/debug/app.apk
          path: tg-src/TMessagesProj_App/build/outputs/apk/afat/debug/
          if-no-files-found: error
          retention-days: 14
