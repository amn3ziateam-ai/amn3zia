name: Build AMN3ZIA (Telegram Fork)

on:
  workflow_dispatch:
  push:
    paths:
      - 'patches/**'
      - '.github/workflows/build-telegram-fork.yml'

env:
  # Pin to a specific Telegram commit so NDK cache always hits.
  # Update this only when you intentionally want a newer Telegram version.
  TG_TAG: 9fea726
  NDK_VERSION: 27.2.12479018

jobs:
  build-fork:
    name: Build APK (Telegram fork + AMN3ZIA branding)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 1. Checkout patches repo ───────────────────────────────────────────
      - name: Checkout amn3zia repo
        uses: actions/checkout@v4
        with:
          path: amn3zia

      # ── 2. Shallow-clone Telegram Android ─────────────────────────────────
      - name: Clone Telegram Android (shallow, pinned commit)
        run: |
          # Clone master then checkout the pinned commit for stable NDK cache
          git clone --depth=50 https://github.com/DrKLO/Telegram tg-src
          git -C tg-src checkout "$TG_TAG"
          echo "Telegram HEAD: $(git -C tg-src rev-parse --short HEAD)"

      # ── 3. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. NDK 27.2 ───────────────────────────────────────────────────────
      - name: Install NDK 27.2
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;$NDK_VERSION" --sdk_root="$ANDROID_HOME"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV

      # ── 5. Apply AMN3ZIA branding + feature patches ────────────────────────
      - name: Apply AMN3ZIA branding
        env:
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          bash amn3zia/patches/apply-branding.sh tg-src \
            "$TELEGRAM_API_ID" "$TELEGRAM_API_HASH"

      # ── 6. Gradle dependencies cache (~/.gradle) ──────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: tg-gradle-deps-${{ hashFiles('tg-src/**/*.gradle*', 'tg-src/gradle.properties') }}
          restore-keys: tg-gradle-deps-

      # ── 7. NDK native build cache (.cxx compiled .so files) ───────────────
      # Key: NDK version + CMakeLists hash. If only Java/patches change,
      # this cache hits → NDK step is skipped → build takes ~5 min not 40 min.
      - name: Cache NDK native build
        uses: actions/cache@v4
        with:
          path: |
            tg-src/TMessagesProj/.cxx
            tg-src/TMessagesProj/build/intermediates/cmake
            tg-src/TMessagesProj/build/intermediates/stripped_native_libs
            tg-src/TMessagesProj/build/intermediates/merged_native_libs
            tg-src/TMessagesProj/libs
          # Key = NDK version + pinned TG commit → stable, always hits after first build
          key: tg-ndk-${{ env.NDK_VERSION }}-${{ env.TG_TAG }}
          restore-keys: tg-ndk-${{ env.NDK_VERSION }}-

      # ── 8. Build APK ──────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: tg-src
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew :TMessagesProj_App:assembleAfatDebug \
            -Pandroid.ndkVersion=$NDK_VERSION \
            --no-daemon --stacktrace \
            2>&1 | tee /tmp/gradle_build.log
          echo "=== Last 30 lines ==="
          tail -30 /tmp/gradle_build.log

      # ── 9. Debug: find APKs ────────────────────────────────────────────────
      - name: Find built APKs
        if: always()
        run: find tg-src -name "*.apk" -type f 2>/dev/null || echo "(none)"

      # ── 10. Upload APK ─────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: amn3zia-fork-debug
          path: tg-src/TMessagesProj_App/build/outputs/apk/afat/debug/
          if-no-files-found: error
          retention-days: 30
