name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch: {}

env:
  TDLIB_REF: master            # pin to a commit SHA once you've got a working build, for reproducibility
  # TDLib's example/android scripts pass this straight to `sdkmanager "ndk;<version>"`,
  # so it must be the numeric package version (not the release-name like "r26d").
  NDK_VERSION: "26.3.11579264"

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: build TDLib's native libs + Java sources for Android, ONCE.
  # Cached on (TDLIB_REF, NDK_VERSION) so subsequent runs skip the ~45min build
  # entirely as long as neither changes.
  # ---------------------------------------------------------------------------
  build-tdlib:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.key.outputs.value }}
    steps:
      - name: Resolve TDLib commit SHA (for a stable cache key)
        id: key
        run: |
          SHA=$(git ls-remote https://github.com/tdlib/td.git "${TDLIB_REF}" | cut -f1)
          echo "value=tdlib-android-${SHA}-ndk${NDK_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache TDLib Android build output
        id: cache
        uses: actions/cache@v4
        with:
          path: tdlib-out
          key: ${{ steps.key.outputs.value }}

      - name: Set up JDK 17
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build php-cli gperf zlib1g-dev libssl-dev unzip

      - name: Clone TDLib
        if: steps.cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch "${TDLIB_REF}" https://github.com/tdlib/td.git td-src

      - name: Cross-compile TDLib for Android (all ABIs)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd td-src/example/android
          chmod +x check-environment.sh fetch-sdk.sh build-openssl.sh build-tdlib.sh
          ./fetch-sdk.sh SDK "${NDK_VERSION}"
          ./build-openssl.sh SDK "${NDK_VERSION}"
          ./build-tdlib.sh SDK "${NDK_VERSION}"

      - name: Collect build artifacts
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p tdlib-out/jniLibs tdlib-out/java
          # build-tdlib.sh drops per-ABI .so files under tdlib/libs/<abi>/ and
          # generated Java sources (org.drinkless.tdlib) under tdlib/java/
          cp -r td-src/example/android/tdlib/libs/. tdlib-out/jniLibs/
          cp -r td-src/example/android/tdlib/java/. tdlib-out/java/
          ls -R tdlib-out

      - name: Upload TDLib artifacts (always, so later jobs can use them even on cache-hit)
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-android
          path: tdlib-out
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Stage 2: assemble the APK using the TDLib output from stage 1.
  # ---------------------------------------------------------------------------
  build-apk:
    needs: build-tdlib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download TDLib artifacts
        uses: actions/download-artifact@v4
        with:
          name: tdlib-android
          path: tdlib-out

      - name: Place TDLib binaries into the project
        run: |
          set -e
          for abi_dir in tdlib-out/jniLibs/*/; do
            abi=$(basename "$abi_dir")
            mkdir -p "android/app/src/main/jniLibs/$abi"
            cp "$abi_dir"/*.so "android/app/src/main/jniLibs/$abi/"
          done
          # Drop generated Java sources alongside the app sources so Gradle compiles them in.
          mkdir -p android/app/src/main/java
          cp -r tdlib-out/java/. android/app/src/main/java/ 2>/dev/null || true
          find android/app/src/main/jniLibs -type f
          find android/app/src/main/java -path '*org/drinkless*' -name '*.java' | head

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Write local.properties with Telegram API credentials
        run: |
          cat >> android/local.properties <<EOF
          TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
          EOF

        # secrets.* are masked in logs automatically by GitHub Actions

      - name: Fetch Gradle 8.7 wrapper files
        # The runner's preinstalled Gradle (9.x) `wrapper` task fails its
        # "Test of distribution url" check against services.gradle.org's
        # redirect chain, even though the URL resolves fine (verified with curl).
        # Sidestep that broken validation by fetching the wrapper files
        # directly from the tagged Gradle source release instead.
        run: |
          set -e
          mkdir -p android/gradle/wrapper
          base="https://raw.githubusercontent.com/gradle/gradle/v8.7.0"
          curl -sSfL "$base/gradlew" -o android/gradlew
          curl -sSfL "$base/gradlew.bat" -o android/gradlew.bat
          curl -sSfL "$base/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar
          # Don't use the tag's own gradle-wrapper.properties — at the v8.7.0
          # tag it still points at the gradle-8.7-rc-4 distribution, which AGP
          # rejects ("Minimum supported Gradle version is 8.7. Current version
          # is 8.7-rc-4"). Write one that points at the final 8.7 release.
          cat > android/gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: amn3zia-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
